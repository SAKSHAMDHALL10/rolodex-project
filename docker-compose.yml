services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rolodex
    ports:
      - "5432:5432"
    volumes:
      - rolodex_pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/rolodex
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      # NEXT_PUBLIC_API_URL is inlined into the client bundle at build time by
      # Next.js, so it must be passed as a build arg - setting it under
      # `environment:` alone (as a previous version of this file did) has no
      # effect, since the container never rebuilds the bundle at startup.
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  rolodex_pg_data:

services:
  db:
    image: pgvector/pgvector:pg16
    init: true
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rolodex
    ports:
      - "5432:5432"
    volumes:
      - rolodex_pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rolodex"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build: ./backend
    init: true
    restart: unless-stopped
    env_file:
      # Optional so the database, API, docs, and frontend can start before a
      # Gemini key is configured. AI endpoints return a clear 502 until a real
      # GEMINI_API_KEY is added to backend/.env.
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/rolodex
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      # NEXT_PUBLIC_API_URL is inlined into the client bundle at build time by
      # Next.js, so it must be passed as a build arg - setting it under
      # `environment:` alone (as a previous version of this file did) has no
      # effect, since the container never rebuilds the bundle at startup.
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  rolodex_pg_data:

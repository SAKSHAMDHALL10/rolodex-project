services:
  - type: web
    name: rolodex-agent-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      # Set for real in the Render dashboard - these are secrets / deployment-
      # specific values and must not be committed:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_EMBEDDING_DIMENSIONS
        value: "1536"
      - key: DUPLICATE_SIMILARITY_THRESHOLD
        value: "0.90"
      - key: DUPLICATE_NAME_FUZZ_THRESHOLD
        value: "88"
